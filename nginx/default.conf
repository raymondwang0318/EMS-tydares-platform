# ─── 前台 (port 80) ───
server {
    listen 80;
    server_name _;

    root /var/www/ems;
    index index.html;

    # Hashed assets — 永久快取（檔名含 hash，內容變就是新檔名）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html — 永不快取，每次都去 nginx 拿最新版
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /ingest/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /commands {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /admin/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /reports/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # ADR-026 V2-final — 所有新 endpoints 走 /v1/ 前綴
    location /v1/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /health {
        proxy_pass http://api:8000;
    }
    location /docs {
        proxy_pass http://api:8000;
    }
    location /openapi.json {
        proxy_pass http://api:8000;
    }
    location /ws {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    # 811C SSE 中繼 → Edge Pi
    location /stream/811c {
        proxy_pass http://192.168.10.180:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}

# ─── 後台 Admin UI (port 8080) ───
server {
    listen 8080;
    server_name _;

    root /var/www/admin;
    index index.html;

    # Hashed assets — 永久快取（檔名含 hash，內容變就是新檔名）
    # 命中規則：URL path 以 /assets/ 開頭（實際 bundle 是絕對路徑 /assets/index-<hash>.js）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # /index.html exact match — 永不 cache（舊 pattern 保留）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # admin-ui SPA 入口 exact match — 永不 cache（M-PM-047 根治）
    # 即使 try_files fallback 到 /index.html，response header 仍走此 location 規則
    location = /admin-ui/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }

    # admin-ui index.html exact match — 永不 cache（M-PM-047 根治）
    location = /admin-ui/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }

    # 所有其他路徑（SPA client-side routes 如 /admin-ui/edges / /admin-ui/reports 等）
    # 回 /index.html 時強制 no-cache 避免瀏覽器 cache 住舊 index.html
    # （M-PM-047 根治 cache 事件第 1/2 次：Wizard 遷移 + Reports MVP 發佈後舊 bundle 殘留）
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    # API proxy — 所有後端路由
    location /admin/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /commands {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /ingest/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /reports/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # ADR-026 V2-final — 所有新 endpoints 走 /v1/ 前綴
    location /v1/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /docs {
        proxy_pass http://api:8000;
    }
    location /openapi.json {
        proxy_pass http://api:8000;
    }
    location /health {
        proxy_pass http://api:8000;
    }
    location /ws {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    # 811C SSE 中繼 → Edge Pi
    location /stream/811c {
        proxy_pass http://192.168.10.180:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}
