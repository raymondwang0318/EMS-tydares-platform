version: "3.8"

# Tydares EMS Central Platform — Docker Compose
# VM102 (192.168.10.202)
# PostgreSQL runs on VM104 (192.168.10.204) — NOT in this compose
#
# 前台: http://192.168.10.202/        (nginx:80 → ems-api:8000)
# 後台: http://192.168.10.202:8080/   (nginx:8080 → ems-api:8000)
# WebSocket: ws://192.168.10.202/ws   (nginx → ems-api:8000)
# MQTT: 192.168.10.202:1883

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ems-api
    restart: always
    expose:
      - "8000"
    env_file:
      - ./api/.env
    environment:
      # 非敏感：MQTT broker routing + 本站標籤
      - MQTT_BROKER_HOST=ems-mosquitto
      - MQTT_BROKER_PORT=1883
      - WAKEUP_DEFAULT_SITE_ID=TYDARES
    depends_on:
      - mosquitto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 512m

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile.worker
    container_name: ems-worker
    restart: always
    env_file:
      - ./api/.env
    mem_limit: 256m

  nginx:
    image: nginx:alpine
    container_name: ems-nginx
    restart: always
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ui/frontend:/var/www/ems:ro
      - ./ui/admin:/var/www/admin:ro
    depends_on:
      - api
    mem_limit: 64m

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ems-mosquitto
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    mem_limit: 128m

  # M-P11-E36: ICP DAS iSN-811C IR camera IP scanner (arp-scan + filter OUI 00:0d:e0)
  # network_mode=host 必要 (UDP/ARP broadcast 跨不過 Docker bridge);
  # 與 ems-api / mosquitto 同 host network (Tydares 192.168.10.0/24 LAN);
  # 業主 0 操作 eSearch.exe;底層自動掃 + 上報 ems-api ip-scan-report endpoint.
  ipscan:
    build:
      context: .
      dockerfile: ./api/Dockerfile.ipscan
    container_name: ems-ipscan
    restart: always
    network_mode: host
    environment:
      - ICPDAS_SUBNET=192.168.10.0/24
      - ICPDAS_OUI=00:0d:e0
      - EMS_API_URL=http://localhost:8080
      - SCAN_INTERVAL_SEC=3600
    env_file:
      - ./api/.env   # 從這拿 EMS_API_TOKEN
    cap_add:
      - NET_RAW       # arp-scan 需 CAP_NET_RAW
      - NET_ADMIN
    mem_limit: 64m

volumes:
  mosquitto-data:
