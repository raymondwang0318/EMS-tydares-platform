version: "3.8"

# Tydares EMS Central Platform — Docker Compose
# VM102 (192.168.10.202)
# PostgreSQL runs on VM104 (192.168.10.204) — NOT in this compose
#
# 前台: http://192.168.10.202/        (nginx:80 → ems-api:8000)
# 後台: http://192.168.10.202:8080/   (nginx:8080 → ems-api:8000)
# WebSocket: ws://192.168.10.202/ws   (nginx → ems-api:8000)
# MQTT: 192.168.10.202:1883

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ems-api
    restart: always
    expose:
      - "8000"
    env_file:
      - ./api/.env
    environment:
      # 非敏感：MQTT broker routing + 本站標籤
      - MQTT_BROKER_HOST=ems-mosquitto
      - MQTT_BROKER_PORT=1883
      - WAKEUP_DEFAULT_SITE_ID=TYDARES
    depends_on:
      - mosquitto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 512m

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile.worker
    container_name: ems-worker
    restart: always
    env_file:
      - ./api/.env
    mem_limit: 256m

  nginx:
    image: nginx:alpine
    container_name: ems-nginx
    restart: always
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ui/frontend:/var/www/ems:ro
      - ./ui/admin:/var/www/admin:ro
    depends_on:
      - api
    mem_limit: 64m

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ems-mosquitto
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    mem_limit: 128m

volumes:
  mosquitto-data:
